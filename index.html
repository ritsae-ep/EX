<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="author" content="fiction.ep@gmail.com">
    <meta name="description" content="운동방">
    <meta name="keywords" content="운동기록">
	<title>운동기록지</title>

	<link rel="stylesheet" href="./css/style.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
	<header class="header">
		<div class="header__inner">
			<strong id="welcomeText" class="header__user"></strong>
			<div class="header__actions">
				<button id="adminBtn" style="display:none;">관리</button>
				<button id="logoutBtn">로그아웃</button>
			</div>
		</div>
	</header>
	<main class="app">
		<section class="my-dashboard">
			<div class="my-dashboard__head">
				<p id="myGreeting" class="my-dashboard__greeting"></p>
				<span id="myStatusText" class="my-dashboard__status"></span>
			</div>

			<div class="my-dashboard__body">
				<p class="my-dashboard__label">이번 주 운동</p>

				<div class="my-dashboard__week">
					<span>월</span>
					<span>화</span>
					<span>수</span>
					<span>목</span>
					<span>금</span>
					<span>토</span>
					<span>일</span>
				</div>

				<div id="myProgressDots" class="my-dashboard__dots"></div>

				<strong id="myWeeklyCount" class="my-dashboard__count"></strong>
				<p id="myGoalMessage" class="my-dashboard__message"></p>
				<p class="my-dashboard__rule">주 3회 운동하면 이번 주 목표 달성입니다</p>
			</div>

			<div class="my-dashboard__today">
				<p id="todayStatusText"></p>

				<button id="todayCheckBtn" class="my-dashboard__main-btn">
				오늘 운동 완료하기 💪
				</button>

				<button id="deleteTodayCheckBtn" class="my-dashboard__sub-btn" hidden>
				기록 취소
				</button>
			</div>

			<button id="statusBtn" class="my-dashboard__status-btn">
			운동 어려워요
			</button>
		</section>
		<section class="member-section">
			<div class="member-section__head">
				<div class="week-filter">
					<input type="month" id="monthInput" max="">
					<select id="weekSelect">
						<option value="">주차 선택</option>
					</select>
				</div>
				<div class="search-box">
					<input type="search" id="memberSearchInput" placeholder="닉네임 입력 시 자동 검색">
				</div>
				<div class="filter">
					<button id="showAllBtn" class="active">전체 보기</button>
					<button id="showDangerBtn">경고 위험</button>
					<button id="rankingBtn">운동 랭킹</button>
				</div>
			</div>
			
			<ul id="memberList"></ul>
		</section>
		
		<!-- modal -->
		<div class="modal-group">
			<div id="statusModal" class="modal">
				<div class="modal-content">
					<button type="button" class="modal-close" data-close-modal>
						<i class="fa-solid fa-xmark"></i>
   					</button>
					<p id="currentStatusText"></p>
					<div class="status-choice">
						<button type="button" class="status-choice__btn" data-status="busy">
							😵 바빠요
						</button>

						<button type="button" class="status-choice__btn" data-status="injured">
							🤕 부상이에요
						</button>

						<button type="button" class="status-choice__btn" data-status="normal">
							✅ 다시 정상 참여
						</button>
					</div>
					<p class="status-choice__notice">
						바쁨/부상 상태는 30일 동안 주 3회 기준에서 제외됩니다
					</p>
				</div>
			</div>
			
			<div id="checkModal" class="modal">
				<div class="modal-content">
					<button type="button" class="modal-close" data-close-modal>
						<i class="fa-solid fa-xmark"></i>
   					</button>
					<p id="checkMessage"></p>
					<input type="file" id="checkPhotoInput" accept="image/*">
					<button id="saveCheckBtn">오늘 운동 완료</button>
				</div>
			</div>
			
			<div id="rankingModal" class="modal">
				<div class="modal-content">
					<button id="closeRankingBtn" type="button" class="modal-close" data-close-modal>
						<i class="fa-solid fa-xmark"></i>
   					</button>
					<h2>🏆 이번 주 운동 랭킹</h2>
					<ul id="rankingList"></ul>
				</div>
			</div>

			<div id="photoModal" class="modal">
				<div class="modal-content">
					<button type="button" class="modal-close" data-close-modal>
						<i class="fa-solid fa-xmark"></i>
   					</button>
					<h2>운동 인증 사진</h2>
					<img id="photoPreview" alt="운동 인증 사진" style="max-width:100%;">
				</div>
			</div>
		</div>
	</main>

	<div id="nicknameModal" class="modal">
		<div class="modal-content">
			<h2>닉네임 설정</h2>
			<p>카톡방에서 사용하는 닉네임을 입력해주세요.</p>
			<input type="text" id="nicknameInput" placeholder="닉네임 입력">
			<button id="saveNicknameBtn">저장</button>
		</div>
	</div>

	<script type="module" src="./js/pages/app.js"></script>
</body>
</html>
