<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>관리자 | 운동기록지</title>

	<link rel="stylesheet" href="./css/style.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="admin-page">
	<header class="header">
		<div class="header__inner">
			<strong class="header__user">관리하기</strong>
			<div class="header__actions">
				<a href="./index.html" class="btn">기록지</a>
				<button id="logoutBtn">로그아웃</button>
			</div>
		</div>
	</header>
	<main class="app">
		<section class="member-section">
			<div class="member-section__head">
				<div class="week-filter">
					<input type="month" id="monthInput" max="">
					<select id="weekSelect">
						<option value=""></option>
					</select>
					<button id="excelDownloadBtn" title="엑셀 다운로드" aria-label="엑셀 다운로드">
						<img src="./img/excel.png" class="btn-icon" alt="">
					</button>
				</div>
				<div class="search-box">
					<input type="search" id="memberSearchInput" placeholder="닉네임 입력 시 자동 검색">
				</div>
			</div>

			<section class="admin-section is-open">
				<button type="button" class="admin-section__toggle">
					<span>🚨 관리 필요</span>
				</button>
				<div class="admin-section__body">
					<ul id="dangerMemberList"></ul>
				</div>
			</section>

			<section class="admin-section is-open">
				<button type="button" class="admin-section__toggle">
					<span>승인 요청</span>
				</button>
				<div class="admin-section__body">
					<ul id="pendingMemberList"></ul>
				</div>
			</section>

			<section class="admin-section is-open">
				<button type="button" class="admin-section__toggle">
					<span>전체 멤버</span>
				</button>
				<div class="admin-section__body">
					<ul id="memberList"></ul>
				</div>
			</section>
		</section>
			
		<!-- modal -->
		<div class="modal-group">	
			<div id="adminStatusModal" class="modal">
				<div class="modal-content">
					<button type="button" class="modal-close" data-close-modal>
						<i class="fa-solid fa-xmark"></i>
   					</button>
					<p id="adminStatusTitle"></p>
					<select id="adminStatusSelect">
						<option value="normal">없음</option>
						<option value="busy">바쁨</option>
						<option value="injured">부상</option>
					</select>
					<button id="adminSaveStatusBtn">저장</button>
				</div>
			</div>

			<div id="photoModal" class="modal">
				<div class="modal-content">
					<button type="button" class="modal-close" data-close-modal>
						<i class="fa-solid fa-xmark"></i>
   					</button>
					<h3>운동 인증 사진</h3>
					<div id="photoList"></div>
				</div>
			</div>

			<div id="adminCheckModal" class="modal">
				<div class="modal-content">
					<button type="button" class="modal-close" data-close-modal>
						<i class="fa-solid fa-xmark"></i>
   					</button>
					<h3 id="adminCheckTitle">인증 추가</h3>
					<input type="date" id="adminCheckDate">
					<button type="button" id="adminCheckSaveBtn">저장</button>
				</div>
			</div>
		</div>
	</main>

	<script type="module" src="./js/pages/admin.js"></script>
</body>
</html>
