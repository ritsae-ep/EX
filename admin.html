<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>관리자 페이지</title>

	<link rel="stylesheet" href="./css/style.css">
</head>
<body class="admin-page">
	<header class="header">
		<h1>관리자 페이지</h1>
		<div class="header__actions">
			<a href="./index.html">사용자 화면</a>
			<button type="button" id="logoutBtn">로그아웃</button>
		</div>
	</header>
	<main>
		<section>
			<button id="showAllBtn">전체 회원</button>
			<button id="showPendingBtn">승인 대기</button>
			<button id="showBanBtn">탈퇴 후보</button>
			<button id="excelDownloadBtn">엑셀 다운로드</button>
			<input type="search" id="memberSearchInput" placeholder="닉네임 검색">
			<h2>회원관리</h2>
			<div class="week-filter">
				<input type="month" id="monthInput" max="">
				<select id="weekSelect">
					<option value="">주차 선택</option>
				</select>
			</div>
			<ul id="memberList"></ul>
			<div id="adminStatusModal" class="modal">
				<div class="modal-content">
					<p id="currentStatusText"></p>
					<select id="adminStatusSelect">
						<option value="normal">없음</option>
						<option value="busy">바쁨</option>
						<option value="injured">부상</option>
					</select>
					<button id="adminSaveStatusBtn">저장</button>
					<button class="modal-close" data-close-modal>닫기</button>
				</div>
			</div>

			<div id="photoModal" class="modal">
				<div class="modal-content">
					<h2>운동 인증 사진</h2>
					<img id="photoPreview" alt="운동 인증 사진" style="max-width:100%;">
					<div id="photoList"></div>
					<button class="modal-close" data-close-modal>닫기</button>
				</div>
			</div>
		</section>
	</main>

	<script type="module" src="./js/pages/admin.js"></script>
</body>
</html>
