<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>관리자 페이지</title>

	<link rel="stylesheet" href="./css/style.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="admin-page">
	<header class="header">
		<strong class="header__user">관리자 페이지</strong>
		<div class="header__actions">
			<a href="./index.html" class="btn">사용자 화면</a>
			<button id="logoutBtn">로그아웃</button>
		</div>
	</header>
	<main class="app">
		<section class="member-section">
			<div class="member-section__head">
				<div class="week-filter">
					<input type="month" id="monthInput" max="">
					<select id="weekSelect">
						<option value=""></option>
					</select>
				</div>
				<div class="search-box">
					<i class="fa-solid fa-magnifying-glass"></i>
					<input type="search" id="memberSearchInput" placeholder="닉네임 입력 시 자동 검색">
				</div>
				<div class="filter">
					<button id="showAllBtn">전체</button>
					<button id="showPendingBtn">승인대기</button>
					<button id="showBanBtn">추방</button>
					<button id="excelDownloadBtn">
						<img src="./img/excel.png" class="btn-icon"> xls
					</button>
				</div>
			</div>

			<ul id="memberList"></ul>
		</section>
			
		<!-- modal -->
		<div class="modal-group">	
			<div id="adminStatusModal" class="modal">
				<div class="modal-content">
					<button type="button" class="modal-close" data-close-modal>
						<i class="fa-solid fa-xmark"></i>
   					</button>
					<p id="adminStatusTitle"></p>
					<select id="adminStatusSelect">
						<option value="normal">없음</option>
						<option value="busy">바쁨</option>
						<option value="injured">부상</option>
					</select>
					<button id="adminSaveStatusBtn">저장</button>
				</div>
			</div>

			<div id="photoModal" class="modal">
				<div class="modal-content">
					<button type="button" class="modal-close" data-close-modal>
						<i class="fa-solid fa-xmark"></i>
   					</button>
					<h2>운동 인증 사진</h2>
					<div id="photoList"></div>
				</div>
			</div>
		</div>
	</main>

	<script type="module" src="./js/pages/admin.js"></script>
</body>
</html>
